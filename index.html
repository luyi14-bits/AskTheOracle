<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- [FIX F-06][FIX F-07] CSP: 移除 unsafe-inline（btn-share 已改用 CSS class）+ 移除 frame-ancestors（meta 标签不兼容） -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; worker-src 'self';">
    <title>天问 · AskTheOracle</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>
    <div id="app">
        <header>
            <h1>天问</h1>
            <p class="subtitle">心存疑问，掷爻问天</p>
            <p class="header-watermark">⚠ 仅供娱乐 · luyi14-bits 全栈开源项目</p>
        </header>

        <main id="main-stage">
            <!-- 模式切换 -->
            <div id="mode-tabs">
                <button id="tab-tongqian" class="mode-tab active">铜钱掷爻</button>
                <button id="tab-meihua" class="mode-tab">梅花易数</button>
                <button id="tab-name" class="mode-tab">姓名起卦</button>
                <button id="tab-jiaobei" class="mode-tab">掷筊问杯</button>
                <button id="tab-liuren" class="mode-tab">掐指小六壬</button>
            </div>

            <!-- 卦象展示区 -->
            <div id="gua-display">
                <p class="placeholder">🎋 静心凝神，掷爻起卦</p>
            </div>

            <!-- 铜钱操作区 -->
            <div id="controls">
                <button id="btn-cast" class="btn-primary">掷爻起卦</button>
            </div>

            <!-- 梅花操作区 -->
            <div id="meihua-controls" class="hidden">
                <div class="meihua-input-row">
                    <div class="meihua-input-group">
                        <label for="input-num1">上卦数</label>
                        <input type="number" id="input-num1" min="1" max="9999" placeholder="1-9999">
                    </div>
                    <div class="meihua-input-group">
                        <label for="input-num2">下卦数</label>
                        <input type="number" id="input-num2" min="1" max="9999" placeholder="1-9999">
                    </div>
                    <div class="meihua-input-group">
                        <label for="input-num3">动爻数</label>
                        <input type="number" id="input-num3" min="1" max="9999" placeholder="1-9999">
                    </div>
                </div>
                <div class="meihua-btn-row">
                    <button id="btn-meihua-random" class="btn-aux">🎲 随机数字</button>
                    <button id="btn-meihua-time" class="btn-aux">🕐 用当前时间</button>
                </div>
                <button id="btn-meihua-cast" class="btn-primary">起卦</button>
            </div>

            <!-- 姓名起卦区 -->
            <div id="name-controls" class="hidden">
                <div class="name-input-row">
                    <input type="text" id="input-name" placeholder="请输入姓名（如：诸葛亮）" maxlength="10">
                </div>
                <button id="btn-name-cast" class="btn-primary">起卦</button>
                <button id="btn-toggle-cross" class="btn-aux">交叉分析</button>
                <div id="birth-controls" class="hidden">
                    <div class="birth-input-row">
                        <div class="birth-input-group">
                            <label for="input-birth-year">年</label>
                            <input type="number" id="input-birth-year" min="1900" max="2100" placeholder="1990">
                        </div>
                        <div class="birth-input-group">
                            <label for="input-birth-month">月</label>
                            <input type="number" id="input-birth-month" min="1" max="12" placeholder="1">
                        </div>
                        <div class="birth-input-group">
                            <label for="input-birth-day">日</label>
                            <input type="number" id="input-birth-day" min="1" max="31" placeholder="1">
                        </div>
                        <div class="birth-input-group">
                            <label for="input-birth-hour">时</label>
                            <input type="number" id="input-birth-hour" min="0" max="23" placeholder="12">
                        </div>
                    </div>
                    <button id="btn-cross-cast" class="btn-primary">交叉起卦</button>
                </div>
            </div>

            <!-- 掷筊问杯区 -->
            <div id="jiaobei-controls" class="hidden">
                <div id="jiaobei-display">
                    <p class="placeholder">🙏 掷筊问杯，诚心则灵</p>
                </div>
                <button id="btn-jiaobei" class="btn-primary">掷杯</button>
            </div>

            <!-- 小六壬掐指区 -->
            <div id="liuren-controls" class="hidden">
                <div id="liuren-sub-tabs">
                    <button id="liuren-tab-lunar" class="liuren-sub-tab active">农历推算</button>
                    <button id="liuren-tab-solar" class="liuren-sub-tab">公历推算</button>
                </div>

                <div id="liuren-lunar-controls">
                    <div class="meihua-input-row">
                        <div class="meihua-input-group">
                            <label for="input-liuren-month">农历月</label>
                            <input type="number" id="input-liuren-month" min="1" max="12" placeholder="1-12">
                        </div>
                        <div class="meihua-input-group">
                            <label for="input-liuren-day">农历日</label>
                            <input type="number" id="input-liuren-day" min="1" max="30" placeholder="1-30">
                        </div>
                        <div class="meihua-input-group">
                            <label for="input-liuren-hour">时辰</label>
                            <input type="number" id="input-liuren-hour" min="1" max="12" placeholder="1-12">
                        </div>
                    </div>
                    <button id="btn-liuren-cast" class="btn-primary">掐指推算</button>
                </div>

                <div id="liuren-solar-controls" class="hidden">
                    <div class="birth-input-row">
                        <div class="birth-input-group">
                            <label for="liuren-sel-year">年</label>
                            <select id="liuren-sel-year"></select>
                        </div>
                        <div class="birth-input-group">
                            <label for="liuren-sel-month">月</label>
                            <select id="liuren-sel-month"></select>
                        </div>
                        <div class="birth-input-group">
                            <label for="liuren-sel-day">日</label>
                            <select id="liuren-sel-day"></select>
                        </div>
                    </div>
                    <div class="birth-input-row">
                        <div class="birth-input-group">
                            <label for="liuren-sel-hour">时</label>
                            <select id="liuren-sel-hour"></select>
                        </div>
                        <div class="birth-input-group">
                            <label for="liuren-sel-minute">分</label>
                            <select id="liuren-sel-minute"></select>
                        </div>
                    </div>
                    <button id="btn-liuren-solar" class="btn-primary">掐指推算</button>
                </div>
            </div>

            <!-- 结果区 -->
            <div id="result" class="hidden">
                <div id="gua-name"></div>
                <div id="gua-symbol"></div>
                <div id="gua-interpretation"></div>
                <button id="btn-share" class="btn-aux btn-share">📤 分享卦象</button>
            </div>
        </main>

        <footer>
            <p>天问 · AskTheOracle</p>
            <p class="footer-disclaimer">⚠ 仅供娱乐，不构成人生决策依据</p>
        </footer>
    </div>

    <script src="js/gua-data.js"></script>
    <script src="js/plain-data.js"></script>
    <script src="js/stroke-data.js"></script>
    <script src="js/animation.js"></script>
    <script src="js/app.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(function () {});
    }
    </script>
</body>
</html>
