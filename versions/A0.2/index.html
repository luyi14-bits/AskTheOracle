<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; frame-ancestors 'none';">
    <title>问卦 · WenGua</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>问卦</h1>
            <p class="subtitle">心存疑问，掷爻问卦</p>
        </header>

        <main id="main-stage">
            <!-- 卦象展示区 -->
            <div id="gua-display">
                <p class="placeholder">🎋 静心凝神，掷爻起卦</p>
            </div>

            <!-- 操作区 -->
            <div id="controls">
                <button id="btn-cast" class="btn-primary">掷爻起卦</button>
            </div>

            <!-- 结果区 -->
            <div id="result" class="hidden">
                <div id="gua-name"></div>
                <div id="gua-symbol"></div>
                <div id="gua-interpretation"></div>
            </div>
        </main>

        <footer>
            <p>问卦 · 六十四卦小玩具</p>
        </footer>
    </div>

    <script src="js/gua-data.js"></script>
    <script src="js/animation.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
